<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chalk Talk</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0B162C; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { max-width: 520px; text-align: center; }
  .badge { display: inline-block; padding: 6px 14px; background: #E03C31; color: #fff; border-radius: 999px; font-size: 11px; font-weight: 800; letter-spacing: 2px; }
  h1 { font-size: 44px; margin: 20px 0 8px; font-weight: 800; }
  p { color: #cbd5e1; line-height: 1.6; font-size: 16px; }
  .links { margin-top: 32px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  a.btn { display: inline-block; padding: 12px 20px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
  .primary { background: #E03C31; color: #fff; }
  .ghost { background: transparent; color: #fff; border: 1.5px solid #334155; }
  footer { margin-top: 40px; color: #64748b; font-size: 12px; }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">CHALK TALK</span>
    <h1>Master the playbook.</h1>
    <p>Chalk Talk is the mobile coaching app for football teams. Build quizzes, design plays, and communicate with your players &mdash; all in one place.</p>
    <div class="links">
      <a class="btn primary" href="/privacy">Privacy Policy</a>
      <a class="btn ghost" href="/terms">Terms of Service</a>
      <a class="btn ghost" href="mailto:support@chalktalkgo.com">Contact Support</a>
    </div>
    <footer>&copy; 2026 Chalk Talk. All rights reserved.</footer>
  </div>
</body>
</html>
